<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer Framework Structure -->
  <line x1="80" y1="50" x2="80" y2="450" stroke="#4b5563" stroke-width="2" />
  <line x1="320" y1="50" x2="320" y2="450" stroke="#4b5563" stroke-width="2" />
  <line x1="80" y1="50" x2="320" y2="50" stroke="#4b5563" stroke-width="2" />
  <line x1="80" y1="450" x2="320" y2="450" stroke="#4b5563" stroke-width="2" />
  <line x1="80" y1="150" x2="320" y2="150" stroke="#4b5563" />

  <!-- Reaction Vessel Body -->
  <path d="M120 120h160v160c0 44.18-35.82 80-80 80s-80-35.82-80-80V120z" fill="rgba(15, 23, 42, 0.4)" stroke="#00f0ff" stroke-width="2" />

  <!-- Glass Double Jacket Layer -->
  <path d="M105 120h190v160c0 52.47-42.53 95-95 95s-95-42.53-95-95V120z" stroke="rgba(0, 240, 255, 0.3)" stroke-dasharray="4 2" />

  <!-- Main Agitator Shaft & Motor Drive -->
  <rect x="180" y="20" width="40" height="30" rx="3" fill="#1f2937" stroke="#4b5563" />
  <line x1="200" y1="50" x2="200" y2="300" stroke="#f97316" stroke-width="2.5" />
  <!-- Stirrer Impeller Blades -->
  <path d="M160 280c0 8.28 17.91 15 40 15s40-6.72 40-15" stroke="#f97316" stroke-width="2.5" />

  <!-- Outlet Valve Flange at Bottom -->
  <rect x="185" y="360" width="30" height="12" rx="1" fill="#1f2937" />
  <path d="M185 372l30 15v-15l-30 15" stroke="#f97316" />

  <!-- Connecting Pipes -->
  <path d="M60 180h45M295 180h45" stroke="#38bdf8" />
  <circle cx="50" cy="180" r="4" fill="#38bdf8" />
  <circle cx="350" cy="180" r="4" fill="#38bdf8" />
</svg>
